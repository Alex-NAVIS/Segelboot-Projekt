<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NAVIS Bordlogbuch</title>

<style>
	body { background-color: #001a26; color: #00e6e6; font-family: "Segoe UI", Arial, sans-serif; margin: 0; overflow-x: hidden; text-align: center; }
	header { background-color: #002b3a; color: #00ffff; padding: 15px; font-size: 1.8em; font-weight: bold; border-bottom: 2px solid #005566; }
	#navbar { display: flex; justify-content: center; gap: 8px; background-color: #002b3a; padding: 6px 0; border-bottom: 1px solid #005566; position: relative; }
	.navbtn { background-color: #003d52; color: #00ffff; border: 1px solid #007a99; border-radius: 5px; padding: 3px 10px; text-decoration: none; font-size: 0.9em; font-weight: bold; transition: 0.2s; }
	.navbtn:hover { background-color: #00b8d4; color: #001a26; border-color: #00e6e6; }
	.section-title { color: #00ffff; margin-top: 30px; font-size: 1.4em; border-bottom: 1px solid #007a99; display: inline-block; padding-bottom: 4px; }
	.button-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin: 20px; margin-top: 10px; }
	.logbtn { background: #0b2a38; border: 2px solid #007a99; border-radius: 10px; color: white; padding: 16px; font-size: 17px; cursor: pointer; box-shadow: 0 0 10px rgba(0,255,255,0.2); transition: 0.3s; }
	.logbtn:hover { background: #104a5f; }
	select, textarea, input { background: #002b3a; color: white; border: 1px solid #007a99; border-radius: 6px; padding: 8px; margin: 6px; }
	textarea { width: 70%; height: 100px; }
	#status { margin-top: 20px; font-weight: bold; color: #66ffff; }
	.group { background: #001f2b; border: 1px solid #005566; border-radius: 12px; margin: 20px auto; padding: 15px; max-width: 700px; box-shadow: 0 0 10px rgba(0,255,255,0.08); }
	@media (max-width: 600px) { .button-panel { grid-template-columns: repeat(2, 1fr); } textarea { width: 90%; } }
	footer { margin: 40px 0 20px 0; padding-top: 10px; border-top: 1px solid #005566; color: #00b8d4; font-size: 0.9em; text-align: center; opacity: 0.9; }
</style>
</head>

<body>

<header>NAVIS Bordlogbuch</header>

<nav id="navbar">
    <a href="index.html" class="navbtn">Dashboard</a>
    <a href="karte.html" class="navbtn">Karte</a>
    <a href="autopilot.html" class="navbtn">Autopilot</a>
    <a href="kompass.html" class="navbtn">Kompass</a>
    <a href="horizont.html" class="navbtn">Horizont</a>
    <a href="Alarm.html" class="navbtn">Überwachung</a>
</nav>

<div id="status">Bereit für Logbuch-Eintrag...</div>

<!-- Manöver -->
<div class="group">
    <div class="section-title">Manöver</div>
    <div class="button-panel">
        <button class="logbtn" onclick="logEvent('hafen_auslaufen')">⛵ Ausgelaufen</button>
        <button class="logbtn" onclick="logEvent('hafen_einlaufen')">⛵ Eingelaufen</button>
        <button class="logbtn" onclick="logEvent('anker_gesetzt')">⚓ Anker gesetzt</button>
        <button class="logbtn" onclick="logEvent('anker_gehoben')">⚓ Anker gehoben</button>
        <button class="logbtn" onclick="logEvent('segel_gesetzt')">Segel gesetzt</button>
        <button class="logbtn" onclick="logEvent('segel_geborgen')">Segel geborgen</button>
        <button class="logbtn" onclick="logEvent('reff1')">Reff 1</button>
        <button class="logbtn" onclick="logEvent('reff2')">Reff 2</button>
        <button class="logbtn" onclick="logEvent('reff_raus')">Reff raus</button>
        <button class="logbtn" onclick="logEvent('wende')">Wende</button>
        <button class="logbtn" onclick="logEvent('halse')">Halse</button>
        <button class="logbtn" onclick="logEvent('motor_start')">Motor START</button>
        <button class="logbtn" onclick="logEvent('motor_stop')">Motor STOP</button>
    </div>
</div>

<!-- Sicherheit -->
<div class="group">
    <div class="section-title">Sicherheit & Übungen</div>
    <div class="button-panel">
        <button class="logbtn" onclick="logEvent('sicherheitseinweisung')">Einweisung</button>
        <button class="logbtn" onclick="logEvent('mob_uebung')">MOB Übung</button>
        <button class="logbtn" onclick="logEvent('mob_alarm')">🔴 MOB ALARM</button>
        <button class="logbtn" onclick="logEvent('rettungswesten_kontrolle')">Westen Check</button>
    </div>
</div>

<!-- Wetter -->
<div class="group">
    <div class="section-title">Wind & Wellen</div><br>
    <div>
        <label>Wind:</label>
        <select id="winddir">
            <option>N</option><option>NE</option><option>E</option><option>SE</option>
            <option>S</option><option>SW</option><option>W</option><option>NW</option>
        </select>
        <select id="wind">
            <option value="">Bft</option>
            <option>0</option><option>1</option><option>2</option><option>3</option>
            <option>4</option><option>5</option><option>6</option><option>7</option>
        </select>
    </div>
    <div style="margin-top:10px;">
        <label>Welle:</label>
        <select id="waves">
            <option>ruhig</option><option>0.5 m</option><option>1 m</option>
            <option>1.5 m</option><option>2 m</option>
        </select>
    </div>
    <button class="logbtn save-btn" onclick="sendWeather()">Wetter speichern</button>
</div>

<!-- Freitext -->
<div class="group">
    <div class="section-title">Logbuch Notiz</div><br>
    <textarea id="note" placeholder="Freitext Logbucheintrag..."></textarea><br>
    <button class="logbtn save-btn" onclick="sendNote()">Notiz speichern</button>
</div>


<footer>
	<strong>Marine Logbuch v1.1</strong><br>
	Entwickelt von <span style="color:#00ffff;">Alex</span> & <span style="color:#00ffff;">NAVIS</span><br>
	© 2026 – Bootssystem ESP32 • Live Monitoring
</footer>

<script>
    function setStatus(text) {
        const s = document.getElementById("status");
        s.innerText = text;
        setTimeout(() => { s.innerText = "Bereit..."; }, 3000);
    }

    function logEvent(type) {
        fetch("/logbook?type=" + type)
            .then(r => setStatus("✔ Gespeichert: " + type.replace('_',' ')))
            .catch(e => setStatus("❌ Fehler!"));
    }

    function sendWeather() {
        let dir = document.getElementById("winddir").value;
        let wind = document.getElementById("wind").value;
        let waves = document.getElementById("waves").value;
        fetch(`/logbook?type=wetter&dir=${dir}&wind=${wind}&waves=${waves}`)
            .then(r => setStatus("✔ Wetter gespeichert"))
            .catch(e => setStatus("❌ Fehler!"));
    }

    function sendNote() {
        let text = document.getElementById("note").value;
        if(!text) return;
        fetch("/logbook?type=note&text=" + encodeURIComponent(text))
            .then(r => {
                setStatus("✔ Notiz gespeichert");
                document.getElementById("note").value = "";
            })
            .catch(e => setStatus("❌ Fehler!"));
    }
</script>

</body>
</html>
