<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="css/style.css">
<title>NAVIS Bordlogbuch</title>
<style>
	.section-title { color: #00ffff; margin-top: 30px; font-size: 1.4em; border-bottom: 1px solid #007a99; display: inline-block; padding-bottom: 4px; }
	.button-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin: 20px; margin-top: 10px; }
	.logbtn { background: #0b2a38; border: 2px solid #007a99; border-radius: 10px; color: white; padding: 16px; font-size: 17px; cursor: pointer; box-shadow: 0 0 10px rgba(0,255,255,0.2); transition: 0.3s; }
	.logbtn:hover { background: #104a5f; }
	select, textarea, input { background: #002b3a; color: white; border: 1px solid #007a99; border-radius: 6px; padding: 8px; margin: 6px; }
	textarea { width: 70%; height: 100px; }
	#status { margin-top: 20px; font-weight: bold; color: #66ffff; }
	.group { background: #001f2b; border: 1px solid #005566; border-radius: 12px; margin: 20px auto; padding: 15px; max-width: 700px; box-shadow: 0 0 10px rgba(0,255,255,0.08); }
	@media (max-width: 600px) { .button-panel { grid-template-columns: repeat(2, 1fr); } textarea { width: 90%; } }
	</style>
</head>

<body>
<header data-i18n="log_header">NAVIS Bordlogbuch</header>

<div id="status" data-i18n="log_status_ready">Bereit für Logbuch-Eintrag...</div>

<!-- Manöver -->
<div class="group">
    <div class="section-title" data-i18n="log_sec_maneuver">Manöver</div>
    <div class="button-panel">
        <button class="logbtn" onclick="logEvent('hafen_auslaufen')">⛵ <span data-i18n="log_btn_depart">Ausgelaufen</span></button>
        <button class="logbtn" onclick="logEvent('hafen_einlaufen')">⛵ <span data-i18n="log_btn_arrive">Eingelaufen</span></button>
        <button class="logbtn" onclick="logEvent('anker_gesetzt')">⚓ <span data-i18n="log_btn_anchor_down">Anker gesetzt</span></button>
        <button class="logbtn" onclick="logEvent('anker_gehoben')">⚓ <span data-i18n="log_btn_anchor_up">Anker gehoben</span></button>
        <button class="logbtn" onclick="logEvent('segel_gesetzt')" data-i18n="log_btn_sails_up">Segel gesetzt</button>
        <button class="logbtn" onclick="logEvent('segel_geborgen')" data-i18n="log_btn_sails_down">Segel geborgen</button>
        <button class="logbtn" onclick="logEvent('reff1')" data-i18n="log_btn_reef1">Reff 1</button>
        <button class="logbtn" onclick="logEvent('reff2')" data-i18n="log_btn_reef2">Reff 2</button>
        <button class="logbtn" onclick="logEvent('reff_raus')" data-i18n="log_btn_reef_out">Reff raus</button>
        <button class="logbtn" onclick="logEvent('wende')" data-i18n="log_btn_tack">Wende</button>
        <button class="logbtn" onclick="logEvent('halse')" data-i18n="log_btn_jibe">Halse</button>
        <button class="logbtn" onclick="logEvent('motor_start')" data-i18n="log_btn_engine_start">Motor START</button>
        <button class="logbtn" onclick="logEvent('motor_stop')" data-i18n="log_btn_engine_stop">Motor STOP</button>
    </div>
</div>

<!-- Sicherheit -->
<div class="group">
    <div class="section-title" data-i18n="log_sec_safety">Sicherheit & Übungen</div>
    <div class="button-panel">
        <button class="logbtn" onclick="logEvent('sicherheitseinweisung')" data-i18n="log_btn_safety_briefing">Einweisung</button>
        <button class="logbtn" onclick="logEvent('mob_uebung')" data-i18n="log_btn_mob_drill">MOB Übung</button>
        <button class="logbtn" onclick="logEvent('mob_alarm')">🔴 <span data-i18n="log_btn_mob_alarm">MOB ALARM</span></button>
        <button class="logbtn" onclick="logEvent('rettungswesten_kontrolle')" data-i18n="log_btn_lifejacket_check">Westen Check</button>
    </div>
</div>

<!-- Wetter -->
<div class="group">
    <div class="section-title" data-i18n="log_sec_weather">Wind & Wellen</div><br>
    <div>
        <label data-i18n="log_lbl_wind">Wind:</label>
        <select id="winddir">
            <option>N</option><option>NE</option><option>E</option><option>SE</option>
            <option>S</option><option>SW</option><option>W</option><option>NW</option>
        </select>
        <select id="wind">
            <option value="" data-i18n="log_opt_bft">Bft</option>
            <option>0</option><option>1</option><option>2</option><option>3</option>
            <option>4</option><option>5</option><option>6</option><option>7</option>
        </select>
    </div>
    <div style="margin-top:10px;">
        <label data-i18n="log_lbl_waves">Welle:</label>
        <select id="waves">
            <option data-i18n="log_opt_wave_calm">ruhig</option>
            <option>0.5 m</option>
            <option>1 m</option>
            <option>1.5 m</option>
            <option>2 m</option>
        </select>
    </div>
    <button class="logbtn save-btn" onclick="sendWeather()" data-i18n="log_btn_save_weather">Wetter speichern</button>
</div>

<!-- Freitext -->
<div class="group">
    <div class="section-title" data-i18n="log_sec_note">Logbuch Notiz</div><br>
    <textarea id="note" data-i18n-placeholder="log_ph_note" placeholder="Freitext Logbucheintrag..."></textarea><br>
    <button class="logbtn save-btn" onclick="sendNote()" data-i18n="log_btn_save_note">Notiz speichern</button>
</div>

<footer>
	<strong>Marine Logbuch v1.1</strong><br>
	Entwickelt von <span style="color:#00ffff;">Eike</span> & <span style="color:#00ffff;">NAVIS</span><br>
	© 2026 – Bootssystem ESP32 • Live Monitoring
</footer>

<script src="lang/lang_manager_log.js"></script>
<script src="js/navis-navbar.js"></script> 
<script src="js/navis-telemetry.js"></script> 
<script>
// ======================================================================
// Übergibt die gewünschten Seiten-IDs, die in der Navbar erscheinen sollen:
// ======================================================================
createNavbar(["dashboard", "karte", "kompass", "horizont"]);

    function setStatus(text) {
        const s = document.getElementById("status");
        s.innerText = text;
        setTimeout(() => { s.innerText = "Bereit..."; }, 3000);
    }

    function logEvent(type) {
        fetch("/logbook?type=" + type)
            .then(r => setStatus("✔ Gespeichert: " + type.replace('_',' ')))
            .catch(e => setStatus("❌ Fehler!"));
    }

    function sendWeather() {
        let dir = document.getElementById("winddir").value;
        let wind = document.getElementById("wind").value;
        let waves = document.getElementById("waves").value;
        fetch(`/logbook?type=wetter&dir=${dir}&wind=${wind}&waves=${waves}`)
            .then(r => setStatus("✔ Wetter gespeichert"))
            .catch(e => setStatus("❌ Fehler!"));
    }

    function sendNote() {
        let text = document.getElementById("note").value;
        if(!text) return;
        fetch("/logbook?type=note&text=" + encodeURIComponent(text))
            .then(r => {
                setStatus("✔ Notiz gespeichert");
                document.getElementById("note").value = "";
            })
            .catch(e => setStatus("❌ Fehler!"));
    }
</script>

</body>
</html>
