<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="css/style.css">
<title>Horizont — NAVIS Marine Dashboard</title>
<style>
/* Lokale Ergänzung passend zu Ihrer style.css */
.panel-center {
  display: inline-block; /* Verhindert das Strecken auf 100% Breite */
  margin: 40px auto;    /* Nutzt das zentrierende Margin-Modell Ihrer main-Klasse */
  padding: 12px;
}

#horizonCanvas { 
  display: block; 
  border-radius: 50%; 
  margin: 0 auto;       /* Garantiert die Zentrierung des Canvas im Panel */
}

/* NEU: Styling für die Live- und Maximalwert-Anzeige */
.telemetry-values {
  display: flex;
  justify-content: space-around;
  max-width: 600px;
  margin: 20px auto 5px auto;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-size: 13px;
  color: #fff;
}
.val-block {
  text-align: center;
  padding: 4px 12px;
  border-radius: 4px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.05);
  min-width: 140px;
}
.val-roll { border-left: 3px solid #ff1213; }
.val-pitch { border-left: 3px solid #00d2ff; }
.val-title { font-weight: bold; margin-bottom: 2px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.8; }
</style>
</head>

<body>

<div class="panel">
  <!-- Dein originaler Horizont-Canvas -->
  <canvas id="horizonCanvas"></canvas>
  
  <!-- NEU: Textanzeige für aktuelle Werte und 30s Maxima direkt über dem Chart -->
  <div class="telemetry-values">
    <div class="val-block val-roll">
      <div class="val-title" style="color: #ff1213;">Roll (Rollen)</div>
      <div id="rollText">Wert: 0.0° | Max: 0.0°</div>
    </div>
    <div class="val-block val-pitch">
      <div class="val-title" style="color: #00d2ff;">Pitch (Stampfen)</div>
      <div id="pitchText">Wert: 0.0° | Max: 0.0°</div>
    </div>
  </div>

  <!-- Das verfeinerte Chart.js Canvas -->
  <div style="width: 100%; max-width: 600px; height: 200px; margin-left: auto; margin-right: auto; padding: 0 10px;">
    <canvas id="chartCanvas"></canvas>
  </div>
</div>

<script src="lang/lang_manager.js"></script>
<script src="js/navis-navbar.js"></script>
<script src="js/navis-telemetry.js"></script> 
<!-- Einbindung von Chart.js aus deinem Unterordner -->
<script src="js/chart.min.js"></script>

<!-- 2. Reine Anzeige- und Canvas-Logik -->
<script>
const state = { roll: 0, pitch: 0 };

// ======================================================================
// Übergibt die gewünschten Seiten-IDs, die in der Navbar erscheinen sollen:
// ======================================================================
createNavbar(["dashboard", "karte", "kompass", "horizont"]);

const hCanvas = document.getElementById('horizonCanvas');
const size = Math.min(window.innerWidth, window.innerHeight) * 0.62; // Leicht verkleinert für optimalen Platz
hCanvas.width = size;   
hCanvas.height = size;
hCanvas.style.width = size + 'px';
hCanvas.style.height = size + 'px';
const hctx = hCanvas.getContext('2d');

// --- UNVERÄNDERT: Deine originale Zeichenlogik für den Horizont ---
function drawHorizon(){
  const w = hCanvas.width, h = hCanvas.height;
  const cx = w/2, cy = h/2;
  const r = Math.min(cx, cy) - 10;
  hctx.clearRect(0,0,w,h);
  hctx.save();
  hctx.beginPath();
  hctx.arc(cx, cy, r, 0, Math.PI * 2);
  hctx.clip();

  hctx.save();
  hctx.translate(cx, cy);
  hctx.rotate(state.roll * Math.PI/180);

  const maxPitch = 45;
  const pitchPixels = (state.pitch / maxPitch) * (r * 0.6);

  // Himmel
  const skyTop = -r*2 + pitchPixels;
  const skyGrad = hctx.createLinearGradient(0, skyTop, 0, r*2 + pitchPixels);
  skyGrad.addColorStop(0, '#102b9b');
  skyGrad.addColorStop(0.6, '#3c7fd0');
  hctx.fillStyle = skyGrad;
  hctx.fillRect(-r*2, skyTop, r*4, r*2);

  // Meer
  const seaTop = 0 + pitchPixels;
  const seaGrad = hctx.createLinearGradient(0, seaTop, 0, r*2 + pitchPixels);
  seaGrad.addColorStop(0, '#15301a');
  seaGrad.addColorStop(1, '#271103');
  hctx.fillStyle = seaGrad;
  hctx.fillRect(-r*2, seaTop, r*4, r*4);

  // Horizontlinie
  hctx.strokeStyle = 'rgba(200,200,200,0.85)';
  hctx.lineWidth = 3;
  hctx.beginPath();
  hctx.moveTo(-r*1.15, pitchPixels);
  hctx.lineTo(r*1.15, pitchPixels);
  hctx.stroke();

  // Pitch-Ticks
  hctx.lineWidth = 1.7;
  hctx.strokeStyle = 'rgba(255,255,255,0.85)';
  hctx.fillStyle = '#fff';
  hctx.font = '12px Segoe UI';
  const pitchStep = 5;
  const tickScale = (r / maxPitch) * 0.6;
  for(let p = -60; p <= 60; p += pitchStep){
    const y = -p * tickScale + pitchPixels;
    if(Math.abs(y) > r) continue;
    const len = (p % 15 === 0) ? 44 : 22;
    hctx.beginPath();
    hctx.moveTo(-len, y);
    hctx.lineTo(len, y);
    hctx.stroke();
    if(p % 15 === 0 && p !== 0){
      hctx.textAlign = 'center';
      hctx.fillText((-p) + '°', -len - 14, y - 6);
      hctx.fillText((-p) + '°', len + 14, y - 6);
    }
  }

  hctx.restore();

  // Roll-Ticks
  hctx.save();
  hctx.translate(cx, cy);
  for(let a = -90; a <= 90; a += 5){
    const ang = a * Math.PI / 180;
    const inner = (a % 15 === 0) ? r - 14 : r - 8;
    const outer = r - 4;
    const x1 = inner * Math.sin(ang);
    const y1 = -inner * Math.cos(ang);
    const x2 = outer * Math.sin(ang);
    const y2 = -outer * Math.cos(ang);
    hctx.beginPath();
    hctx.moveTo(x1, y1);
    hctx.lineTo(x2, y2);
    hctx.strokeStyle = 'rgba(255,255,255,0.95)';
    hctx.lineWidth = 1;
    hctx.stroke();

    if(a % 15 === 0){
      const labelR = r - 30;
      const lx = labelR * Math.sin(ang);
      const ly = -labelR * Math.cos(ang);
      hctx.save();
      hctx.translate(lx, ly);
      hctx.rotate(ang * 0.9);
      hctx.fillStyle = '#e6e9eb';
      hctx.font = '12px Segoe UI';
      hctx.textAlign = 'center';
      hctx.textBaseline = 'middle';
      hctx.fillText(a + '°', 0, 0);
      hctx.restore();
    }
  }

  // Dreieck Mittelpunkt
  hctx.save();
  hctx.rotate(-state.roll * Math.PI/180);
  const triTipRadius = r - 10;
  const triBaseRadius = r - 26;
  const triHalfWidth = 5;
  hctx.beginPath();
  hctx.moveTo(0, -triTipRadius);
  hctx.lineTo(-triHalfWidth, -triBaseRadius);
  hctx.lineTo(triHalfWidth, -triBaseRadius);
  hctx.closePath();
  hctx.fillStyle = '#ff1213';
  hctx.fill();
  hctx.strokeStyle = 'rgba(255,255,255,0.55)';
  hctx.lineWidth = 2;
  hctx.stroke();
  hctx.restore();

  hctx.restore();

  // Zentrumskreuz
  hctx.save();
  hctx.strokeStyle = '#ff1213';
  hctx.lineWidth = 3;
  hctx.beginPath();
  hctx.moveTo(cx - 32, cy);
  hctx.lineTo(cx + 32, cy);
  hctx.moveTo(cx, cy);
  hctx.lineTo(cx, cy - 18);
  hctx.stroke();
  hctx.restore();
}

// ===============================
// 📍 Crosshair Plugin
// ===============================
const crosshairPlugin = {
    id: 'crosshairPlugin',
    afterDraw(chart) {
        if (!chart.tooltip?._active?.length) return;
        const ctx = chart.ctx;
        const x = chart.tooltip._active[0].element.x;
        const topY = chart.chartArea.top;
        const bottomY = chart.chartArea.bottom;
        ctx.save();
        ctx.beginPath(); 
        ctx.moveTo(x, topY); 
        ctx.lineTo(x, bottomY); 
        ctx.strokeStyle = 'rgba(255,255,255,0.25)'; 
        ctx.setLineDash([4, 4]); 
        ctx.stroke();
        ctx.restore();
    }
};

// --- Chart.js Setup ---
const cCanvas = document.getElementById('chartCanvas');
const maxDurationMs = 30000;  // 30 Sekunden Aufzeichnung
const recordIntervalMs = 130; // ~7.5 Hz Intervall
let lastRecordTime = 0;

// DOM Elemente für die Textanzeigen holen
const rollTextEl = document.getElementById("rollText");
const pitchTextEl = document.getElementById("pitchText");

const telemetryChart = new Chart(cCanvas, {
  type: 'line',
  plugins: [crosshairPlugin], 
  data: {
    labels: [],
    datasets: [
      {
        label: 'Roll',
        data: [],
        borderColor: '#ff1213', 
        backgroundColor: 'rgba(255, 18, 19, 0.05)',
        borderWidth: 2,
        pointRadius: 0,        
        pointHoverRadius: 4,
        tension: 0.2           
      },
      {
        label: 'Pitch',
        data: [],
        borderColor: '#00d2ff', 
        backgroundColor: 'rgba(0, 210, 255, 0.05)',
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 4,
        tension: 0.2
      }
    ]
  },
  options: {
    animation: false,          
    responsive: true,
    maintainAspectRatio: false,
    devicePixelRatio: window.devicePixelRatio || 1,
    interaction: { mode: 'nearest', axis: 'x', intersect: false },
    hover: { mode: 'nearest', axis: 'x', intersect: false },
    plugins: {
      legend: { display: false }, // Legende ausgeblendet, da wir oben die schicken Textblöcke haben
      tooltip: {
        enabled: true,
        mode: 'nearest',
        intersect: false,
        callbacks: {
          label: function(context) {
            const l = context.dataset.label || "";
            const v = context.raw;
            return `${l}: ${Number(v).toFixed(1)}°`;
          }
        }
      }
    },
    scales: {
      x: { display: false },   
      y: {
        suggestedMin: -10,
        suggestedMax: 10,
        grid: { color: 'rgba(255,255,255,0.07)' },
        ticks: {
          color: '#fff',       
          font: { family: 'Segoe UI' },
          callback: function(v) { return v + '°'; }
        }
      }
    }
  }
});

const maxPoints = Math.ceil(maxDurationMs / recordIntervalMs);

// Animation: Telemetriedaten verarbeiten
let lastTime = performance.now();
function integrate(now){
  const dt = (now - lastTime)/1000;
  lastTime = now;
  const lerp = (a,b,t)=>a+(b-a)*t;
  const sm = 1 - Math.exp(-2*dt);
  
  const target = window.navisTelemetry || { roll: 0, pitch: 0 };

  for(const k in state){ 
    if(typeof target[k]==='number') state[k]=lerp(state[k],target[k],sm); 
  }

  // ZEITGESTEUERTE AUFZEICHNUNG & PEAK-BERECHNUNG (5-10 Hz)
  if (now - lastRecordTime >= recordIntervalMs) {
    lastRecordTime = now;

    // 1. Daten in das Diagramm schieben
    telemetryChart.data.labels.push('');
    telemetryChart.data.datasets[0].data.push(state.roll);  
    telemetryChart.data.datasets[1].data.push(state.pitch); 

    // 2. Ringpuffer limitieren
    if (telemetryChart.data.labels.length > maxPoints) {
      telemetryChart.data.labels.shift();
      telemetryChart.data.datasets[0].data.shift();
      telemetryChart.data.datasets[1].data.shift();
    }

    // 3. KORREKTUR: Ermittlung der echten Höchst- (Max) und Tiefstwerte (Min) der letzten 30s
    // Falls das Array leer sein sollte (Sicherheitsnetz), weichen wir auf 0 aus
    const rollData = telemetryChart.data.datasets[0].data;
    const pitchData = telemetryChart.data.datasets[1].data;

    const maxRoll = rollData.length ? Math.max(...rollData) : 0;
    const minRoll = rollData.length ? Math.min(...rollData) : 0;

    const maxPitch = pitchData.length ? Math.max(...pitchData) : 0;
    const minPitch = pitchData.length ? Math.min(...pitchData) : 0;

    // 4. Textanzeigen im UI mit beiden Richtungen live aktualisieren
    // Zeigt übersichtlich: Aktueller Wert | Höchster positiver Ausschlag | Tiefster negativer Ausschlag
    rollTextEl.textContent = `Wert: ${state.roll.toFixed(1)}° | Max: +${maxRoll.toFixed(1)}° / Min: ${minRoll.toFixed(1)}°`;
    pitchTextEl.textContent = `Wert: ${state.pitch.toFixed(1)}° | Max: +${maxPitch.toFixed(1)}° / Min: ${minPitch.toFixed(1)}°`;

    // 5. Diagramm aktualisieren
    telemetryChart.update('none');
  }

  drawHorizon();
  requestAnimationFrame(integrate);
}

requestAnimationFrame(integrate);
</script>
</body>
</html>
