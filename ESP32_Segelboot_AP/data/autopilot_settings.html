<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autopilot Einstellungen</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background:#001d26; color:#fff; font-family:sans-serif; text-align:center; padding:20px; }
    h2 { color:#00bcd4; margin-top:20px; }

    table { margin:20px auto; border-collapse:collapse; width:60%; max-width:400px; }
    th, td { border:1px solid #00bcd4; padding:6px; }
    input[type="number"] { width:80px; background:#002b3a; color:#fff; border:1px solid #007d91; text-align:right; }

    .buttonBar { margin-top:30px; }
    button { margin:5px; padding:10px 18px; font-size:16px; border:none; border-radius:8px; cursor:pointer; }
    #saveBtn { background:#00bcd4; color:#000; }
    #cancelBtn { background:#444; color:#fff; }

    .boatSizeBtn { margin:4px; padding:8px 14px; background:#005566; color:#fff; border:none; border-radius:8px; cursor:pointer; }
    .boatSizeBtn:hover { background:#007d91; }
    .boatSizeBtn.active { background:#00bcd4; color:#000; font-weight:bold; }
  </style>
</head>
<body>

  <h1>⚙️ Autopilot&nbsp;Einstellungen</h1>

  <!-- Abschnitt A: Allgemein -->
  <h2>A&nbsp;–&nbsp;Allgemein</h2>
  <label>
    <input type="checkbox" id="invertPinne"> Pinnenrichtung invertieren
  </label><br>

  <!-- Abschnitt B: Startwerte anhand Bootslänge -->
  <h2>B&nbsp;–&nbsp;Startwerte wählen</h2>
  <div id="boatButtons" style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px;">
    <button class="boatSizeBtn" onclick="setBoatSize(5)">Boot&nbsp;5 m</button>
    <button class="boatSizeBtn" onclick="setBoatSize(6)">Boot&nbsp;6 m</button>
    <button class="boatSizeBtn" onclick="setBoatSize(7)">Boot&nbsp;7 m</button>
    <button class="boatSizeBtn" onclick="setBoatSize(8)">Boot&nbsp;8 m</button>
    <button class="boatSizeBtn" onclick="setBoatSize(9)">Boot&nbsp;9 m</button>
    <button class="boatSizeBtn" onclick="setBoatSize(10)">Boot&nbsp;10 m</button>
    <button class="boatSizeBtn" onclick="setBoatSize(11)">Boot&nbsp;11 m</button>
    <button class="boatSizeBtn" onclick="setBoatSize(12)">Boot&nbsp;12 m</button>
    <button class="boatSizeBtn" onclick="setBoatSize(13)">Boot&nbsp;13 m</button>
    <button class="boatSizeBtn" onclick="setBoatSize(14)">Boot&nbsp;14 m</button>
  </div>

  <!-- Abschnitt C: Basis-PID -->
  <h2>C&nbsp;–&nbsp;Basis-PID</h2>
  <table>
    <thead>
      <tr><th>P</th><th>I</th><th>D</th></tr>
    </thead>
    <tbody>
      <tr>
        <td><input type="number" step="0.001" id="pBase"></td>
        <td><input type="number" step="0.001" id="iBase"></td>
        <td><input type="number" step="0.001" id="dBase"></td>
      </tr>
    </tbody>
  </table>

  <!-- Buttons Speichern/Abbrechen -->
  <div class="buttonBar">
    <button id="saveBtn" onclick="saveConfig()">💾 Speichern</button>
    <button id="cancelBtn" onclick="cancelConfig()">❌ Abbrechen</button>
  </div>

  <!-- Abschnitt D: Gespeicherte Konfiguration -->
  <h2>D&nbsp;–&nbsp;Gespeicherte Konfiguration (LittleFS)</h2>
  <div id="autopilotConfigBox"
       style="max-width:600px; margin:20px auto; background:#002b3a; border:1px solid #007d91; border-radius:10px; padding:12px; text-align:left; font-family:monospace; font-size:13px; white-space:pre; overflow-x:auto;">
    Lade Konfiguration …
  </div>

<script>
  // --- Bootslänge auswählen & PID berechnen ---
  function setBoatSize(length) {
    let P = 0.8 + 0.05 * length;      // P Basiswert
    let I = P * 0.5;                  // I = 50% von P
    let D = P * 0.05 * 1.2;           // D = 5% von P + 20%

    document.getElementById('pBase').value = P.toFixed(3);
    document.getElementById('iBase').value = I.toFixed(3);
    document.getElementById('dBase').value = D.toFixed(3);

    // visuelle Hervorhebung
    document.querySelectorAll('.boatSizeBtn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.boatSizeBtn[onclick="setBoatSize(${length})"]`).classList.add('active');
  }

  // --- Konfiguration speichern ---
  function saveConfig() {
    const params = new URLSearchParams({
      invert: document.getElementById('invertPinne').checked ? 1 : 0,
      P_base: document.getElementById('pBase').value,
      I_base: document.getElementById('iBase').value,
      D_base: document.getElementById('dBase').value
    });

    fetch(`/setConfig?${params.toString()}`)
      .then(r => r.text())
      .then(txt => { alert(txt); window.location.href = "index.html"; })
      .catch(() => alert("❌ Fehler beim Speichern"));
  }

  // --- Abbrechen ---
  function cancelConfig() {
    window.location.href = "index.html";
  }

  // --- Autopilot Konfiguration laden ---
  function loadAutopilotConfig() {
    fetch("/fs/autopilot_config")
      .then(r => { if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
      .then(json => { document.getElementById("autopilotConfigBox").textContent = JSON.stringify(json, null, 2); })
      .catch(err => { document.getElementById("autopilotConfigBox").textContent = "❌ Fehler beim Laden\n" + err; });
  }

  window.addEventListener("load", loadAutopilotConfig);
</script>

</body>
</html>
