
<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="css/style.css">
    <title data-i18n="title_alarms">Alarm Einstellungen</title>

    <!-- Sprach-Manager vor dem Body laden -->
    <script src="lang/lang_manager_alarm.js"></script>


	<style>

	</style>
</head>
<body>
	<header data-i18n="title_alarms">Alarm Einstellungen</header>
	<div class="main">
		<!-- ================= Geschwindigkeit ================= -->
		<div class="group">
			<div class="group-title" data-i18n="group_speed">Geschwindigkeit Boot</div>
			<div class="alarm-box">
				<div class="alarm-head">
					<label><input type="checkbox" id="en_speed_max"><span data-i18n="lbl_speed_max">Geschwindigkeit zu hoch</span></label>
				</div>
				<div class="slider-row">
					<input type="range" id="alarm_speed_max" min="0" max="20" step="0.1" value="10" oninput="upd(this,'v_speed_max')">
					<div class="value"><span id="v_speed_max">10</span> kn</div>
				</div>
			</div>
			<div class="alarm-box">
				<div class="alarm-head">
					<label><input type="checkbox" id="en_speed_min"><span data-i18n="lbl_speed_min">Geschwindigkeit zu niedrig</span></label>
				</div>
				<div class="slider-row">
					<input type="range" id="alarm_speed_min" min="0" max="20" step="0.1" value="2" oninput="upd(this,'v_speed_min')">
					<div class="value"><span id="v_speed_min">2</span> kn</div>
				</div>
			</div>
		</div>

		<!-- ================= Wassertiefe Echolot ================= -->
		<div class="group">
			<div class="group-title" data-i18n="group_depth">Wassertiefe</div>
			<div class="alarm-box">
				<div class="alarm-head">
					<label><input type="checkbox" id="en_echolot"><span data-i18n="lbl_depth_low">Wassertiefe geringer als...</span></label>
				</div>
				<div class="slider-row">
					<input type="range" id="alarm_echolot_dev" min="1" max="8" step="0.1" value="4" oninput="upd(this,'v_echolot_dev')">
					<div class="value"><span id="v_echolot_dev">4</span> m</div>
				</div>
			</div>
		</div>

		<!-- ================= Steuerkurs ================= -->
		<div class="group">
			<div class="group-title" data-i18n="group_course">Abweichung vom Kurs</div>
			<div class="alarm-box">
				<div class="alarm-head">
					<label><input type="checkbox" id="en_course_dev"><span data-i18n="lbl_course_dev">Kursabweichung</span></label>
				</div>
				<div class="slider-row">
					<input type="range" id="alarm_course_dev" min="1" max="15" step="0.1" value="5" oninput="upd(this,'v_course_dev')">
					<div class="value"><span id="v_course_dev">5</span> °</div>
				</div>
			</div>
		</div>

		<!-- ================= Bootslage ================= -->
		<div class="group">
			<div class="group-title" data-i18n="group_attitude">Bootslage</div>
			<div class="alarm-box">
				<div class="alarm-head">
					<label><input type="checkbox" id="en_roll"><span data-i18n="lbl_roll">Krängung (Roll)</span></label>
				</div>
				<div class="slider-row">
					<input type="range" id="alarm_roll" min="0" max="60" step="1" value="25" oninput="upd(this,'v_roll')">
					<div class="value"><span id="v_roll">25</span> °</div>
				</div>
			</div>
			<div class="alarm-box">
				<div class="alarm-head">
					<label><input type="checkbox" id="en_pitch"><span data-i18n="lbl_pitch">Nick (Pitch)</span></label>
				</div>
				<div class="slider-row">
					<input type="range" id="alarm_pitch" min="0" max="60" step="1" value="25" oninput="upd(this,'v_pitch')">
					<div class="value"><span id="v_pitch">25</span> °</div>
				</div>
			</div>
		</div>

		<!-- ================= Wind ================= -->
		<div class="group">
			<div class="group-title" data-i18n="group_wind">Wind</div>
			<div class="alarm-box">
				<div class="alarm-head">
					<label><input type="checkbox" id="en_wind_max"><span data-i18n="lbl_wind_max">Wind zu stark</span></label>
				</div>
				<div class="slider-row">
					<input type="range" id="alarm_wind_max" min="0" max="60" step="1" value="25" oninput="upd(this,'v_wind_max')">
					<div class="value"><span id="v_wind_max">25</span> kn</div>
				</div>
			</div>
			<div class="alarm-box">
				<div class="alarm-head">
					<label><input type="checkbox" id="en_wind_min"><span data-i18n="lbl_wind_min">Wind zu schwach</span></label>
				</div>
				<div class="slider-row">
					<input type="range" id="alarm_wind_min" min="0" max="60" step="1" value="5" oninput="upd(this,'v_wind_min')">
					<div class="value"><span id="v_wind_min">5</span> kn</div>
				</div>
			</div>
			<div class="alarm-box">
				<div class="alarm-head">
					<label><input type="checkbox" id="en_wind_dir"><span data-i18n="lbl_wind_dir">Windrichtungs-Abweichung</span></label>
				</div>
				<div class="slider-row">
					<input type="range" id="alarm_wind_dir" min="0" max="180" step="1" value="30" oninput="upd(this,'v_wind_dir')">
					<div class="value"><span id="v_wind_dir">30</span> °</div>
				</div>
			</div>
		</div>

		<!-- ================= Anker ================= -->
		<div class="group">
			<div class="group-title" data-i18n="group_anchor">Ankerplatz Überwachung</div>
			<div class="alarm-box">
				<div class="alarm-head">
					<label><input type="checkbox" id="en_anchor"><span data-i18n="lbl_anchor_leave">Ankerbereich verlassen</span></label>
				</div>
				<div class="slider-row">
					<input type="range" id="alarm_anchor_radius" min="5" max="200" step="1" value="30" oninput="upd(this,'v_anchor')">
					<div class="value"><span id="v_anchor">30</span> m</div>
				</div>
				<div class="alarm-head">
					<label data-i18n="lbl_chain_len">Ankerkette Länge</label>
				</div>
				<div class="slider-row">
					<input type="range" id="alarm_ankerkette" min="10" max="60" step="1" value="20" oninput="upd(this,'v_ankerkette')">
					<div class="value"><span id="v_ankerkette">20</span> m</div>
				</div>
			</div>
		</div>
	</div>

	<div id="alarmStatus" style="min-height:28px;font-weight:bold;color:#ff4444;margin-top:10px;text-align:center;"></div>
	<div id="saveStatus" style="min-height:24px;font-weight:bold;color:#66ffff;margin-top:6px;text-align:center;"></div>

	<div style="text-align:center; margin-bottom:30px;">
		<button id="saveBtn" class="btn btn-navis" onclick="saveAlarms()" data-i18n="btn_save">Alarme speichern</button>
		<button class="btn btn-red" onclick="resetAlarms()" data-i18n="btn_clear">Alle Alarme löschen</button>
	</div>
	
	<footer>
		<strong>Marine Dashboard Alarm v1.1</strong><br>
		Entwickelt von <span style="color:#00ffff;">Eike</span> & <span style="color:#00ffff;">NAVIS</span><br>
		© 2026 – Bootssystem ESP32 • Überwachung & Alarmsystem
	</footer>

	<!-- Zentrale Steuerungs-Dateien laden -->
	<script src="js/navis-navbar.js"></script> 
	<script src="js/navis-telemetry.js"></script>
<script>
	// 1. Dynamische Navbar mit den mitsendenden IDs aufbauen lassen
	createNavbar(["dashboard", "karte", "kompass", "horizont", "alarm"]);

	// ===============================
	// Alarmcodes → Klartext
	// ===============================
	function alarmText(code) {
		switch (code) {
			case 0: return "✅ Kein Alarm";
			case 1: return "🚨 Geschwindigkeit zu hoch";
			case 2: return "🚨 Geschwindigkeit zu niedrig";
			case 3: return "🌬️ Wind zu stark";
			case 4: return "🌬️ Wind zu schwach";
			case 5: return "Compass Windrichtungs-Abweichung";
			case 6: return "Compass Kursabweichung";
			case 7: return "Anchor Ankerbereich verlassen";
			case 8: return "📐 Krängung zu groß";
			case 9: return "📐 Nickwinkel zu groß";
			case 10: return "Wave Wassertiefe zu gering";
			default: return "⚠️ Unbekannter Alarm";
		}
	}

	// -------------------------------------------------------------
	// Alarm anzeigen
	// -------------------------------------------------------------
	function showAlarm(code) {
		const status = document.getElementById('alarmStatus');
		if (!status) return;
		if (code === 0) {
			status.style.background = "#002b1a";
		} else {
			status.style.background = "#2a0000";
		}
		status.textContent = alarmText(code);
	}

	function upd(slider, id) {
		const target = document.getElementById(id);
		if (target) target.textContent = slider.value;
	}

	// -------------------------------------------------------------
	// ALARME PER HTTP-POST SPEICHERN
	// -------------------------------------------------------------
	async function saveAlarms() {
		const status = document.getElementById('saveStatus');
		const btn = document.getElementById('saveBtn');
		if (btn) btn.disabled = true;
		if (status) {
			status.style.color = "#ffaa00";
			status.textContent = "Sende Alarme...";
		}
		
		const data = {
			en_speed_max:  document.getElementById('en_speed_max').checked,
			speedMax:      +document.getElementById('alarm_speed_max').value,
			en_speed_min:  document.getElementById('en_speed_min').checked,
			speedMin:      +document.getElementById('alarm_speed_min').value,
			en_echolot:    document.getElementById('en_echolot').checked,
			echolotMin:    +document.getElementById('alarm_echolot_dev').value,
			en_wind_max:   document.getElementById('en_wind_max').checked,
			windMax:       +document.getElementById('alarm_wind_max').value,
			en_wind_min:   document.getElementById('en_wind_min').checked,
			windMin:       +document.getElementById('alarm_wind_min').value,
			en_wind_dir:   document.getElementById('en_wind_dir').checked,
			windDir:       +document.getElementById('alarm_wind_dir').value,
			en_course_dev: document.getElementById('en_course_dev').checked,
			courseDev:     +document.getElementById('alarm_course_dev').value,
			en_anchor:     document.getElementById('en_anchor').checked,
			anchorRadius:  +document.getElementById('alarm_anchor_radius').value,
			anchorChain:   +document.getElementById('alarm_ankerkette').value,
			en_roll:       document.getElementById('en_roll').checked,
			roll:          +document.getElementById('alarm_roll').value,
			en_pitch:      document.getElementById('en_pitch').checked,
			pitch:         +document.getElementById('alarm_pitch').value
		};
		try {
			const resp = await fetch('/saveAlarms', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify(data)
			});
			const result = await resp.json();
			if (status) {
				status.style.color = result.status === "ok" ? "#00ff88" : "#ff4444";
				status.textContent = result.status === "ok"
					? "✅ Alarme eingerichtet"
					: "❌ Fehler: " + (result.msg || "unbekannt");
			}
			if (btn) btn.disabled = false;
			return result;
		} catch (e) {
			if (status) {
				status.style.color = "#ff4444";
				status.textContent = "❌ Verbindung fehlgeschlagen";
			}
			if (btn) btn.disabled = false;
			return { status: "error" };
		}
	}

	// -------------------------------------------------------------
	// ALARME PER HTTP-GET LADEN
	// -------------------------------------------------------------
	async function loadAlarms() {
		const status = document.getElementById('saveStatus');
		try {
			if (status) {
				status.style.color = "#ffaa00";
				status.textContent = "Lade Alarme...";
			}
			
			const resp = await fetch('/getAlarms');
			if (!resp.ok) throw new Error("HTTP Fehler " + resp.status);
			const data = await resp.json();

			// Checkboxen setzen
			['en_speed_max','en_speed_min','en_echolot','en_wind_max','en_wind_min','en_wind_dir','en_course_dev','en_anchor','en_roll','en_pitch']
				.forEach(id => {
					const el = document.getElementById(id);
					if (el) el.checked = data[id];
				});
				
			// Slider-Werte setzen + Text aktualisieren
			[
				['alarm_speed_max','speedMax','v_speed_max'], ['alarm_speed_min','speedMin','v_speed_min'],
				['alarm_echolot_dev','echolotMin','v_echolot_dev'],
				['alarm_wind_max','windMax','v_wind_max'], ['alarm_wind_min','windMin','v_wind_min'],
				['alarm_wind_dir','windDir','v_wind_dir'], ['alarm_course_dev','courseDev','v_course_dev'],
				['alarm_anchor_radius','anchorRadius','v_anchor'], ['alarm_ankerkette','anchorChain','v_ankerkette'], 
				['alarm_roll','roll','v_roll'], ['alarm_pitch','pitch','v_pitch']
			].forEach(([id, key, vid]) => {
				const el = document.getElementById(id);
				if (el) {
					el.value = data[key];
					upd(el, vid);
				}
			});

			if (status) {
				status.style.color = "#00ff88";
				status.textContent = "✅ Alarme geladen";
			}

		} catch(e) {
			console.error("Fehler beim Laden der Alarmwerte:", e);
			if (status) {
				status.style.color = "#ff4444";
				status.textContent = "❌ Alarme konnten nicht geladen werden";
			}
		}
	}

	// ===================== ALLE ALARME LÖSCHEN =====================
	async function resetAlarms() {
		document.querySelectorAll('input[type=checkbox]').forEach(c => c.checked = false);
		const status = document.getElementById('saveStatus');
		if (status) {
			status.style.color = "#ffaa00";
			status.textContent = "Sende neue Alarm-Konfiguration...";
		}
		try {
			const result = await saveAlarms();
			if (status) {
				status.style.color = result.status === "ok" ? "#00ff88" : "#ff4444";
				status.textContent = result.status === "ok"
					? "🧹 Alle Alarme gelöscht"
					: "❌ Fehler beim Löschen";
			}
		} catch (e) {
			if (status) {
				status.style.color = "#ff4444";
				status.textContent = "❌ Reset fehlgeschlagen";
			}
			console.error(e);
		}
	}

	// -------------------------------------------------------------
	// LIVE INTERVALL LOOP (Liest den Alarmstatus aus zentralem WS)
	// -------------------------------------------------------------
	setInterval(() => {
		const data = window.navisTelemetry;
		if (!data || typeof data !== "object") return;

		// Alarmstatus live ausgeben, sobald ein neuer Code vom ESP32 reinkommt
		if (data.alarm_status !== undefined) {
			showAlarm(data.alarm_status);
		}
	}, 200);

	// Initialisierung beim Laden der Seite
	window.addEventListener('DOMContentLoaded', () => {
		loadAlarms();
	});
</script>
</body>
</html>
