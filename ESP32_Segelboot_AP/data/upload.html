<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title data-i18n="nav_upload">ESP LittleFS Manager</title>
</head>
<body>

  <!-- Zentrierter Inhalts-Container -->
  <div class="upload-container">
    
    <h1 data-i18n="upload_main_header">ESP LittleFS Manager</h1>
    <p data-i18n="upload_sub_header">Verwalten Sie die Dateien auf Ihrem Autopilot-System.</p>

    <form id="uploadForm" class="upload-form">
      <label for="folderInput" data-i18n="upload_lbl_path" class="group-title" style="border:none; padding:0; text-align:left; font-size:0.85rem;">Zielpfad / Unterordner</label>
      <input type="text" id="folderInput" data-i18n-placeholder="upload_ph_path" placeholder="z.B. js/ (optional)" value="">

      <label for="fileInput" data-i18n="upload_lbl_select" class="group-title" style="border:none; padding:0; text-align:left; font-size:0.85rem;">Datei auswählen</label>
      <input type="file" id="fileInput" name="file" required>

      <input type="submit" data-i18n="upload_btn_submit" value="Hochladen">

      <div id="progressBar"><div id="progress"></div></div>
      <div id="status" data-i18n="upload_status_ready">Bereit</div>
    </form>

    <div class="upload-dashboard">
      <label data-i18n="upload_lbl_usage" class="group-title" style="border:none; padding:0; text-align:left; font-size:0.85rem;">Speicherbelegung</label>
      <div id="storageText" style="font-size: 0.8rem; color: #aaa;" data-i18n="upload_val_loading">Lade Daten...</div>
      <div class="storage-bar-bg"><div id="storageBar" class="storage-bar-fill" style="width: 0%"></div></div>
      
      <label style="margin-top: 1rem;" data-i18n="upload_lbl_files" class="group-title" style="border:none; padding:0; text-align:left; font-size:0.85rem;">Dateien im System</label>
      <div id="fileList">
        <!-- Wird per JS befüllt -->
      </div>
    </div>

    <footer>
      <strong>NAVIS & Eike File Upload v1.1</strong><br>
      <span data-i18n="upload_footer_dev">Entwickelt von</span> <span style="color:#00ffff;">Eike</span> & <span style="color:#00ffff;">NAVIS</span><br>
      © 2026 – System ESP32
    </footer>

  </div>

  <script src="lang/lang_manager_upload.js"></script>
  <script src="js/navis-navbar.js"></script> 
  <script src="js/navis-telemetry.js"></script>
	
  <script>		
    createNavbar(["dashboard", "upload", "system"]);
    const form = document.getElementById('uploadForm');
    const statusDiv = document.getElementById('status');
    const progressBar = document.getElementById('progress');
    const fileListDiv = document.getElementById('fileList');
    const storageText = document.getElementById('storageText');
    const storageBar = document.getElementById('storageBar');

    function getTranslation(key, defaultText) {
      if (typeof translations !== 'undefined' && translations[currentLang] && translations[currentLang][key]) {
        return translations[currentLang][key];
      }
      return defaultText;
    }

    function loadFileSystemInfo() {
      fetch('/list_files')
        .then(res => {
          if(!res.ok) throw new Error("Konnte Liste nicht laden");
          return res.json();
        })
        .then(data => {
          fileListDiv.innerHTML = "";
          const fsInfo = data.pop(); 
          const usedKB = (fsInfo.fs_used / 1024).toFixed(1);
          const totalKB = (fsInfo.fs_total / 1024).toFixed(1);
          const percent = (fsInfo.fs_used / fsInfo.fs_total * 100).toFixed(1);

          const template = getTranslation("upload_js_storage_pattern", "{used} KB von {total} KB belegt ({percent}%)");
          storageText.innerText = template
            .replace("{used}", usedKB)
            .replace("{total}", totalKB)
            .replace("{percent}", percent);
            
          storageBar.style.width = percent + "%";

          if(data.length === 0) {
            const noFilesText = getTranslation("upload_js_no_files", "Keine Dateien gefunden.");
            fileListDiv.innerHTML = `<div style="color:#666; font-style:italic; text-align:center;">${noFilesText}</div>`;
          }

          data.forEach(file => {
            const sizeKB = (file.size / 1024).toFixed(1);
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = `<span class="file-name">${file.name}</span><span class="file-size">${sizeKB} KB</span>`;
            fileListDiv.appendChild(item);
          });
        })
        .catch(err => {
          console.error(err);
          storageText.innerText = getTranslation("upload_js_error", "Fehler beim Laden der Dateiliste");
        });
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];
      if (!file) return;

      const folder = document.getElementById('folderInput').value.trim();
      let cleanFolder = folder;
      if (cleanFolder && !cleanFolder.endsWith('/')) cleanFolder += '/';
      const fullPath = cleanFolder + file.name;

      const formData = new FormData();
      formData.append('file', file);
      formData.append('path', fullPath); 

      statusDiv.innerText = "⏳ " + getTranslation("upload_js_running", "Upload läuft...");
      statusDiv.style.color = "#00bcd4";
      progressBar.style.width = "0%";

      fetch('/upload', {
        method: 'POST',
        body: formData
      })
      .then(response => {
        if(response.status === 507) throw new Error(getTranslation("upload_js_full", "Speicher voll!"));
        if(!response.ok) throw new Error(getTranslation("upload_js_server_error", "Server-Fehler: ") + response.status);
        return response.text();
      })
      .then(data => {
        statusDiv.innerText = "✅ " + getTranslation("upload_js_success", "Erfolgreich: ") + file.name;
        statusDiv.style.color = "#4caf50";
        progressBar.style.width = "100%";
        form.reset();
        setTimeout(loadFileSystemInfo, 500);
      })
      .catch(err => {
        statusDiv.innerText = "❌ " + err.message;
        statusDiv.style.color = "#ff5252";
        progressBar.style.width = "0%";
      });
    });

    loadFileSystemInfo();
  </script>
</body>
</html>
